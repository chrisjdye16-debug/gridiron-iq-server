<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GRIDIRON IQ — Film Intelligence Platform</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='3' y='3' width='94' height='94' rx='26' fill='%23c6ff3a'/%3E%3Cpath d='M70.3 40.7 A22 22 0 1 0 70.3 59.3 L70.3 50 L54 50' stroke='%230a0d12' stroke-width='11' fill='none'/%3E%3Ccircle cx='50' cy='50' r='3.4' fill='%230a0d12'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700;800&family=Saira:wght@600;700;800&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
/* ===========================================================
   GRIDIRON IQ — Film Intelligence Platform
   Premium sports-tech design language. Dark-first, light-ready.
   =========================================================== */
:root{
  --lime:#c6ff3a; --lime-deep:#a6e016; --cyan:#34e0ec; --blue:#4f8cff;
  --orange:#ff6a2b; --red:#ff4d4d; --green:#26c281; --violet:#a78bfa; --gold:#ffc23c;
  --run:#26c281; --pass:#4f8cff; --pressure:#ff6a2b; --explosive:#c6ff3a;
  --f-display:"Saira Condensed",sans-serif;
  --f-ui:"Hanken Grotesk",system-ui,sans-serif;
  --f-mono:"JetBrains Mono",ui-monospace,monospace;
  --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:22px; --r-pill:999px;
  --ease:cubic-bezier(.16,1,.3,1);
}
:root, [data-theme="dark"]{
  --bg:#0a0d12;
  --bg-grad: radial-gradient(1200px 600px at 80% -10%, rgba(79,140,255,.08), transparent 60%),
             radial-gradient(900px 500px at -5% 110%, rgba(198,255,58,.05), transparent 60%);
  --panel:#10141b; --surface:#141923; --surface-2:#19202b; --hover:#1e2632;
  --line:#232c39; --line-soft:#1a212b;
  --t-hi:#f3f7fb; --t-mid:#a7b4c2; --t-low:#69788a;
  --chip:#1a2230; --field:#0e1a16; --field-line:rgba(220,235,230,.32);
  --accent:var(--lime); --accent-ink:#0a0d12;
  --shadow:0 18px 50px rgba(0,0,0,.45); --shadow-sm:0 2px 10px rgba(0,0,0,.3);
  --glow:rgba(198,255,58,.14);
}
[data-theme="light"]{
  --bg:#eef1f6;
  --bg-grad: radial-gradient(1100px 560px at 85% -10%, rgba(79,140,255,.10), transparent 60%),
             radial-gradient(800px 460px at -5% 110%, rgba(166,224,22,.10), transparent 60%);
  --panel:#ffffff; --surface:#ffffff; --surface-2:#f4f7fa; --hover:#eef2f7;
  --line:#e2e8f0; --line-soft:#edf1f6;
  --t-hi:#0c1320; --t-mid:#48566a; --t-low:#8492a4;
  --chip:#eef2f8; --field:#0f1c17; --field-line:rgba(220,235,230,.34);
  --accent:#1c8f3a; --accent-ink:#ffffff;
  --shadow:0 18px 44px rgba(20,40,70,.12); --shadow-sm:0 2px 10px rgba(20,40,70,.07);
  --glow:rgba(28,143,58,.12);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:var(--f-ui);background:var(--bg);background-image:var(--bg-grad);
  background-attachment:fixed;color:var(--t-hi);-webkit-font-smoothing:antialiased;overflow:hidden}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:10px;border:3px solid transparent;background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:var(--t-low)}
::selection{background:var(--lime);color:#0a0d12}

/* ===========================================================
   MOTION LAYER
   A film room should feel alive. Everything here is transform/opacity only
   (compositor-friendly, no layout thrash), and the whole layer collapses to
   nothing under prefers-reduced-motion — motion is polish, never the message.
   =========================================================== */
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:none}}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(198,255,58,.55)}70%{box-shadow:0 0 0 7px rgba(198,255,58,0)}100%{box-shadow:0 0 0 0 rgba(198,255,58,0)}}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(300%)}}
@keyframes drawIn{from{stroke-dashoffset:var(--len,200)}to{stroke-dashoffset:0}}
@keyframes scanline{0%{transform:translateY(-8px);opacity:0}12%{opacity:1}88%{opacity:1}100%{transform:translateY(272px);opacity:0}}
@keyframes breathe{0%,100%{opacity:.45}50%{opacity:.9}}
@keyframes driftA{0%,100%{transform:translate(0,0)}50%{transform:translate(28px,-18px)}}
@keyframes driftB{0%,100%{transform:translate(0,0)}50%{transform:translate(-24px,20px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes popIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:none}}

/* Ambient background drift — two slow blobs behind everything. Barely
   perceptible, but the screen is never dead still. */
.amb{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.amb i{position:absolute;border-radius:50%;filter:blur(90px);display:block}
.amb i:nth-child(1){width:520px;height:520px;top:-140px;right:-90px;background:rgba(79,140,255,.10);animation:driftA 26s ease-in-out infinite}
.amb i:nth-child(2){width:440px;height:440px;bottom:-150px;left:-100px;background:var(--glow);animation:driftB 32s ease-in-out infinite}
.app{position:relative;z-index:1}

/* Staggered entrance for cards/tiles on every screen change. */
.page .card,.page .tile,.page .alert{animation:rise .5s var(--ease) both}
.page .tile:nth-child(1){animation-delay:.02s}.page .tile:nth-child(2){animation-delay:.06s}
.page .tile:nth-child(3){animation-delay:.10s}.page .tile:nth-child(4){animation-delay:.14s}
.page .grid > *:nth-child(1){animation-delay:.05s}.page .grid > *:nth-child(2){animation-delay:.12s}
.page .grid > *:nth-child(3){animation-delay:.19s}.page .grid > *:nth-child(4){animation-delay:.26s}

.card{transition:transform .28s var(--ease),box-shadow .28s var(--ease),border-color .2s}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:color-mix(in srgb,var(--accent) 22%,var(--line))}
.tile{transition:transform .25s var(--ease),border-color .2s}
.tile:hover{transform:translateY(-3px);border-color:color-mix(in srgb,var(--accent) 30%,var(--line))}
.logrow{animation:slideIn .35s var(--ease) both}
.mcell{animation:popIn .4s var(--ease) both}
.bar-fill,.bar-split i{transition:width .85s var(--ease)}

/* Bars sweep a highlight across themselves as they fill. */
.bar-track{position:relative;overflow:hidden}
.bar-fill{position:relative;overflow:hidden}
.bar-fill::after{content:"";position:absolute;inset:0;width:40%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.28),transparent);animation:shimmer 2.6s ease-in-out infinite}

/* The count-up number. JS ticks the value; this keeps the glyphs from jittering. */
.tv{font-variant-numeric:tabular-nums}

/* CHARTING STATE — the app should visibly be *working*, not frozen. */
.scanning .fieldwrap{position:relative}
.scanning .fieldwrap::after{content:"";position:absolute;left:0;right:0;height:2px;top:0;
  background:linear-gradient(90deg,transparent,var(--lime),transparent);
  box-shadow:0 0 14px 2px rgba(198,255,58,.5);animation:scanline 2.4s ease-in-out infinite}
.gc-prog{position:relative;overflow:hidden}
.gc-prog i{position:relative;overflow:hidden}
.gc-prog i::after{content:"";position:absolute;inset:0;width:35%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent);animation:shimmer 1.6s linear infinite}
.spinner{width:14px;height:14px;border-radius:50%;border:2px solid var(--line);border-top-color:var(--accent);
  animation:spin .7s linear infinite;display:inline-block;flex:0 0 auto}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--lime);animation:pulse 1.6s infinite;display:inline-block}
.working{animation:breathe 1.9s ease-in-out infinite}

/* Route paths draw themselves in on the field diagram. */
.rt{stroke-dasharray:var(--len,200);stroke-dashoffset:var(--len,200);animation:drawIn .8s var(--ease) forwards}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
  .rt{stroke-dashoffset:0}
}

.app{display:grid;grid-template-columns:248px 1fr;height:100vh;width:100vw}
.side{background:color-mix(in srgb,var(--panel) 88%,transparent);border-right:1px solid var(--line);
  display:flex;flex-direction:column;padding:18px 14px;gap:4px;min-height:0;backdrop-filter:blur(10px)}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 16px}
.brand .tile{width:38px;height:38px;border-radius:11px;flex:0 0 auto;transition:transform .5s var(--ease)}
.brand:hover .tile{transform:rotate(-8deg) scale(1.06)}
.brand .bt{display:flex;flex-direction:column;line-height:1}
.brand .bt b{font-family:var(--f-display);font-weight:800;font-size:17px;text-transform:uppercase;letter-spacing:.01em;line-height:1.05}
.brand .bt b .iq{color:var(--accent-ink);background:var(--accent);padding:0 .22em;border-radius:5px;margin-left:.18em;font-family:"Saira",sans-serif}
.brand .bt span{font-family:var(--f-mono);font-size:8.5px;letter-spacing:.26em;color:var(--t-low);text-transform:uppercase;margin-top:5px}
.nav-group{font-family:var(--f-mono);font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--t-low);padding:14px 10px 6px}
.nav-item{display:flex;align-items:center;gap:12px;padding:9px 11px;border-radius:10px;cursor:pointer;
  color:var(--t-mid);font-weight:600;font-size:14px;border:1px solid transparent;
  transition:all .18s var(--ease);position:relative}
.nav-item:hover{background:var(--hover);color:var(--t-hi);transform:translateX(2px)}
.nav-item.active{background:var(--surface-2);color:var(--t-hi);border-color:var(--line)}
.nav-item.active::before{content:"";position:absolute;left:-14px;top:9px;bottom:9px;width:3px;
  border-radius:0 3px 3px 0;background:var(--accent);animation:popIn .3s var(--ease)}
.nav-item .ico{flex:0 0 auto;opacity:.9;transition:transform .25s var(--ease)}
.nav-item:hover .ico{transform:scale(1.1)}
.nav-item.active .ico{color:var(--accent)}
.nav-item .badge{margin-left:auto;font-family:var(--f-mono);font-size:10px;font-weight:700;color:var(--t-low)}
.nav-item .badge.warn{color:var(--orange);animation:breathe 2s ease-in-out infinite}
.side-foot{margin-top:auto;display:flex;flex-direction:column;gap:10px}
.gamecard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);padding:12px 13px;display:flex;flex-direction:column;gap:8px}
.gamecard .gc-top{display:flex;align-items:center;justify-content:space-between}
.gamecard .gc-lbl{font-family:var(--f-mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--t-low)}
.gamecard .gc-match{font-family:var(--f-display);font-weight:700;font-size:16px}
.gamecard .gc-meta{font-size:11.5px;color:var(--t-mid)}
.gc-prog{height:5px;border-radius:9px;background:var(--chip)}
.gc-prog i{display:block;height:100%;background:linear-gradient(90deg,var(--lime),var(--cyan));border-radius:9px;transition:width .8s var(--ease)}

.main{min-width:0;min-height:0;display:flex;flex-direction:column}
.topbar{height:64px;flex:0 0 auto;border-bottom:1px solid var(--line);display:flex;align-items:center;
  gap:16px;padding:0 22px;background:color-mix(in srgb,var(--panel) 70%,transparent);backdrop-filter:blur(8px)}
.tb-title{display:flex;flex-direction:column;line-height:1.1;flex:0 0 auto}
.tb-title b{font-family:var(--f-display);font-weight:700;font-size:22px;text-transform:uppercase;white-space:nowrap}
.tb-title span{font-size:11.5px;color:var(--t-low);font-weight:500;margin-top:2px;white-space:nowrap}
.seg{display:flex;background:var(--chip);border-radius:var(--r-pill);padding:3px;gap:2px}
.seg button{border:0;background:transparent;color:var(--t-mid);font-family:var(--f-ui);font-weight:700;
  font-size:12.5px;padding:7px 16px;border-radius:var(--r-pill);cursor:pointer;transition:all .2s var(--ease);
  display:flex;align-items:center;gap:7px}
.seg button.on{background:var(--surface);color:var(--t-hi);box-shadow:var(--shadow-sm)}
.seg button.on .dot{background:var(--lime)}
.seg .dot{width:7px;height:7px;border-radius:50%;background:var(--t-low);transition:background .2s}
.tb-spacer{flex:1}
.engine-chip{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r-pill);padding:7px 14px 7px 11px;font-size:12px;font-weight:600;color:var(--t-mid);
  transition:border-color .3s}
.engine-chip.busy{border-color:color-mix(in srgb,var(--lime) 40%,var(--line))}
.engine-chip .pulse{width:8px;height:8px;border-radius:50%;background:var(--lime);animation:pulse 1.8s infinite}
.engine-chip .pulse.idle{background:var(--t-low);animation:none}
.engine-chip b{color:var(--t-hi);font-family:var(--f-mono);font-weight:700}
.icon-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--surface);
  color:var(--t-mid);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s var(--ease)}
.icon-btn:hover{color:var(--t-hi);background:var(--hover);border-color:var(--t-low);transform:translateY(-1px)}
.theme-toggle{display:inline-flex;align-items:center;gap:2px;background:var(--chip);border:1px solid var(--line);
  border-radius:var(--r-pill);padding:3px;cursor:pointer}
.theme-toggle .tt-opt{display:inline-flex;align-items:center;gap:6px;padding:6px 13px;border-radius:var(--r-pill);
  font-size:12.5px;font-weight:700;color:var(--t-low);transition:all .2s var(--ease);line-height:1}
.theme-toggle .tt-opt.on{background:var(--surface);color:var(--t-hi);box-shadow:var(--shadow-sm)}
.theme-toggle .tt-opt.on svg{color:var(--accent)}
.theme-toggle.wide{width:100%}
.theme-toggle.wide .tt-opt{flex:1;justify-content:center;padding:10px}
.menu-btn{display:none;width:40px;height:40px;border-radius:10px;border:1px solid var(--line);background:var(--surface);
  color:var(--t-hi);align-items:center;justify-content:center;cursor:pointer;flex:0 0 auto}
.side-close{display:none;margin-left:auto;width:34px;height:34px;border-radius:9px;border:0;background:transparent;
  color:var(--t-mid);align-items:center;justify-content:center;cursor:pointer}
.side-theme{padding:0 2px 12px}
.scrim{display:none}

.scroll{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden}
.page{padding:24px 26px 60px;max-width:1320px;margin:0 auto}
.page.narrow{max-width:920px}
.grid{display:grid;gap:16px}
.g-2{grid-template-columns:1fr 1fr}
.g-3{grid-template-columns:repeat(3,1fr)}
.g-12{grid-template-columns:7fr 5fr}
.g-21{grid-template-columns:5fr 7fr}
@media(max-width:1100px){.g-2,.g-3,.g-12,.g-21{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);
  box-shadow:var(--shadow-sm);overflow:hidden;display:flex;flex-direction:column;min-width:0}
.card.pad{padding:18px 20px}
.card-h{display:flex;align-items:center;gap:10px;padding:16px 20px 12px}
.card-h .h-ic{width:30px;height:30px;border-radius:8px;background:var(--chip);display:flex;align-items:center;
  justify-content:center;color:var(--accent);flex:0 0 auto;transition:transform .3s var(--ease)}
.card:hover .card-h .h-ic{transform:scale(1.08) rotate(-4deg)}
.card-h h3{margin:0;font-family:var(--f-display);font-weight:700;font-size:17px;text-transform:uppercase;letter-spacing:.02em}
.card-h .sub{font-size:11.5px;color:var(--t-low);font-weight:500}
.card-h .right{margin-left:auto;display:flex;align-items:center;gap:8px}
.card-b{padding:6px 20px 20px}
.eyebrow{font-family:var(--f-mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--t-low)}
.pagetitle{font-family:var(--f-display);font-weight:800;font-size:30px;text-transform:uppercase;margin:2px 0 0}
.intro{color:var(--t-mid);font-size:13.5px;margin:6px 0 0;max-width:72ch;line-height:1.55}
.tiles{display:grid;gap:14px;grid-template-columns:repeat(4,1fr)}
@media(max-width:980px){.tiles{grid-template-columns:repeat(2,1fr)}}
.tile{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);padding:15px 16px;
  display:flex;flex-direction:column;gap:7px;position:relative;overflow:hidden}
.tile .tl{font-family:var(--f-mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--t-low);
  display:flex;align-items:center;gap:7px}
.tile .tv{font-family:var(--f-display);font-weight:800;font-size:38px;line-height:.92}
.tile .tnote{font-size:11.5px;color:var(--t-mid);font-weight:500}
.barrow{display:flex;align-items:center;gap:12px;padding:8px 0}
.barrow.click{cursor:pointer;border-radius:8px;padding:8px;margin:0 -8px;transition:background .15s,transform .15s}
.barrow.click:hover{background:var(--hover);transform:translateX(3px)}
.barrow.sel{background:var(--surface-2);box-shadow:inset 0 0 0 1px var(--line)}
.barrow .bl{width:130px;flex:0 0 auto;font-weight:600;font-size:13.5px;display:flex;align-items:center;gap:8px}
.barrow .bl .tag{font-family:var(--f-mono);font-size:9px;color:var(--t-low)}
.bar-track{flex:1;height:22px;background:var(--chip);border-radius:6px}
.bar-fill{height:100%;border-radius:6px}
.bar-split{display:flex;height:22px;border-radius:6px;overflow:hidden;flex:1}
.bar-split i{height:100%;display:flex;align-items:center;justify-content:center;font-family:var(--f-mono);
  font-size:10px;font-weight:700;color:#06130c;font-style:normal}
.barrow .bv{width:62px;text-align:right;font-family:var(--f-mono);font-weight:700;font-size:13px;flex:0 0 auto}
.barrow .bv .pct{color:var(--t-low);font-size:10px}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:var(--r-pill)}
.pill.run{background:color-mix(in srgb,var(--run) 18%,transparent);color:var(--run)}
.pill.pass{background:color-mix(in srgb,var(--pass) 20%,transparent);color:var(--pass)}
.pill.blitz{background:color-mix(in srgb,var(--pressure) 20%,transparent);color:var(--pressure)}
.pill.hot{background:color-mix(in srgb,var(--red) 18%,transparent);color:var(--red)}
.pill.cool{background:var(--chip);color:var(--t-mid)}
.pill.lime{background:color-mix(in srgb,var(--lime) 22%,transparent);color:var(--lime-deep)}
[data-theme="dark"] .pill.lime{color:var(--lime)}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{background:var(--chip);border:1px solid var(--line);color:var(--t-mid);font-size:12px;font-weight:600;
  padding:6px 12px;border-radius:var(--r-pill);cursor:pointer;transition:all .18s var(--ease)}
.chip:hover{color:var(--t-hi);border-color:var(--t-low);transform:translateY(-1px)}
.chip.on{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
.btn{display:inline-flex;align-items:center;gap:9px;font-family:var(--f-ui);font-weight:700;font-size:13.5px;
  padding:11px 18px;border-radius:var(--r-md);border:1px solid var(--line);background:var(--surface);
  color:var(--t-hi);cursor:pointer;transition:all .2s var(--ease)}
.btn:hover{background:var(--hover);border-color:var(--t-low);transform:translateY(-1px)}
.btn.primary{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
.btn.primary:hover{filter:brightness(1.08);box-shadow:0 6px 20px var(--glow)}
.btn.primary:active{transform:scale(.97)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn.sm{padding:8px 13px;font-size:12.5px}
.loglist{display:flex;flex-direction:column;gap:1px;max-height:340px;overflow-y:auto}
.logrow{display:grid;grid-template-columns:34px 62px 1fr auto;align-items:center;gap:10px;padding:9px 10px;
  border-radius:8px;transition:background .15s,transform .15s;cursor:pointer}
.logrow:hover{background:var(--hover);transform:translateX(3px)}
.logrow .lnum{font-family:var(--f-mono);font-size:11px;color:var(--t-low)}
.logrow .ldd{font-family:var(--f-mono);font-size:11px;font-weight:700;color:var(--t-mid)}
.logrow .lplay{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.logrow .lplay small{color:var(--t-low);font-weight:500}
.logrow .lgain{font-family:var(--f-mono);font-weight:700;font-size:12.5px;text-align:right}
.lgain.pos{color:var(--green)}.lgain.neg{color:var(--orange)}.lgain.big{color:var(--lime)}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl thead th{font-family:var(--f-mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--t-low);
  text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);font-weight:700;position:sticky;top:0;
  background:var(--surface);z-index:1}
.tbl tbody td{padding:10px 12px;border-bottom:1px solid var(--line-soft)}
.tbl tbody tr{transition:background .12s;cursor:pointer}
.tbl tbody tr:hover{background:var(--hover)}
.tbl .mono{font-family:var(--f-mono);font-weight:700}
.tbl .num{text-align:right;font-family:var(--f-mono);font-weight:700}
.matrix{display:grid;gap:6px;grid-template-columns:repeat(4,1fr)}
@media(max-width:860px){.matrix{grid-template-columns:repeat(2,1fr)}}
.mcell{border-radius:8px;padding:11px 10px;display:flex;flex-direction:column;gap:3px;border:1px solid var(--line);
  min-height:64px;justify-content:center;transition:transform .2s var(--ease)}
.mcell:hover{transform:scale(1.03)}
.mcell .mc-h{font-family:var(--f-mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;opacity:.85}
.mcell .mc-v{font-family:var(--f-display);font-weight:800;font-size:22px;line-height:1}
.mcell .mc-s{font-size:10.5px;font-weight:600;opacity:.9}
.alert{display:flex;gap:13px;padding:15px 16px;border-radius:var(--r-md);background:var(--surface);
  border:1px solid var(--line);border-left:3px solid var(--orange);transition:transform .2s var(--ease)}
.alert:hover{transform:translateX(3px)}
.alert .a-ic{width:34px;height:34px;border-radius:9px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;
  background:color-mix(in srgb,var(--orange) 16%,transparent);color:var(--orange)}
.alert.hot{border-left-color:var(--red)}
.alert.hot .a-ic{background:color-mix(in srgb,var(--red) 16%,transparent);color:var(--red)}
.alert.tip{border-left-color:var(--lime)}
.alert.tip .a-ic{background:color-mix(in srgb,var(--lime) 18%,transparent);color:var(--lime-deep)}
[data-theme="dark"] .alert.tip .a-ic{color:var(--lime)}
.alert.cool{border-left-color:var(--cyan)}
.alert.cool .a-ic{background:color-mix(in srgb,var(--cyan) 16%,transparent);color:var(--cyan)}
.alert .a-t{font-weight:700;font-size:14px;margin-bottom:3px}
.alert .a-d{font-size:12.5px;color:var(--t-mid);line-height:1.45}
.alert .a-d b{color:var(--t-hi)}
.fieldwrap{background:var(--field);border-radius:var(--r-md);overflow:hidden;border:1px solid var(--line)}
.fieldwrap svg{display:block;width:100%;height:auto}
.legend{display:flex;flex-wrap:wrap;gap:14px;font-size:11.5px;color:var(--t-mid);font-weight:600;margin-top:12px}
.legend i{display:inline-flex;align-items:center;gap:6px;font-style:normal}
.legend i::before{content:"";width:12px;height:3px;border-radius:2px;background:currentColor}
.donut-wrap{position:relative;display:flex;align-items:center;justify-content:center}
.donut-wrap path{transition:stroke-width .2s}
.donut-wrap path:hover{stroke-width:26}
.donut-c{position:absolute;text-align:center;pointer-events:none}
.donut-c b{font-family:var(--f-display);font-weight:800;font-size:30px;display:block;line-height:1}
.donut-c span{font-family:var(--f-mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--t-low)}
.intake{background:linear-gradient(180deg,var(--surface),var(--panel));border:1px solid var(--line);
  border-radius:var(--r-xl);padding:22px;display:flex;gap:14px;align-items:center;transition:border-color .3s}
.intake:focus-within{border-color:color-mix(in srgb,var(--accent) 40%,var(--line))}
.intake .sq{width:50px;height:50px;border-radius:var(--r-md);background:var(--accent);color:var(--accent-ink);
  display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.intake .field-in{flex:1;display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--line);
  border-radius:var(--r-md);padding:0 14px;height:50px;transition:border-color .2s}
.intake .field-in:focus-within{border-color:var(--accent)}
.intake .field-in input{flex:1;background:transparent;border:0;outline:0;color:var(--t-hi);font-family:var(--f-ui);font-size:14px}
.intake .field-in input::placeholder{color:var(--t-low)}
.row{display:flex;align-items:center;gap:10px}
.between{display:flex;align-items:center;justify-content:space-between;gap:10px}
.muted{color:var(--t-mid)}.lo{color:var(--t-low)}.mono{font-family:var(--f-mono)}
.print-only{display:none}
.empty{text-align:center;padding:44px 20px;color:var(--t-low)}
.empty .ei{width:56px;height:56px;border-radius:16px;background:var(--chip);display:flex;align-items:center;
  justify-content:center;margin:0 auto 14px;color:var(--t-low);animation:breathe 3s ease-in-out infinite}
.empty b{display:block;color:var(--t-hi);font-size:15px;margin-bottom:5px;font-weight:700}
.empty p{font-size:13px;margin:0;max-width:46ch;margin-inline:auto;line-height:1.55}

/* ---------- TRUST LAYER: confidence, unknowns, review ---------- */
.conf{display:inline-flex;align-items:center;gap:5px;font-family:var(--f-mono);font-size:10px;font-weight:700;
  padding:3px 7px;border-radius:5px;background:var(--chip);color:var(--t-low)}
.conf.hi{color:var(--green);background:color-mix(in srgb,var(--green) 14%,transparent)}
.conf.mid{color:var(--gold);background:color-mix(in srgb,var(--gold) 14%,transparent)}
.conf.lo{color:var(--orange);background:color-mix(in srgb,var(--orange) 16%,transparent)}
.conf.fixed{color:var(--cyan);background:color-mix(in srgb,var(--cyan) 14%,transparent)}
.unk{color:var(--t-low);font-style:italic;opacity:.72}
.denom{font-family:var(--f-mono);font-size:10px;color:var(--t-low);font-weight:600}
.denom.warn{color:var(--orange)}
.rev-banner{display:flex;align-items:center;gap:13px;padding:13px 16px;border-radius:var(--r-md);
  background:color-mix(in srgb,var(--orange) 10%,var(--surface));
  border:1px solid color-mix(in srgb,var(--orange) 30%,var(--line));margin-bottom:16px;animation:rise .5s var(--ease)}
.rev-banner .a-ic{width:34px;height:34px;border-radius:9px;flex:0 0 auto;display:flex;align-items:center;
  justify-content:center;background:color-mix(in srgb,var(--orange) 18%,transparent);color:var(--orange)}
.rev-banner .rb-t{font-weight:700;font-size:13.5px}
.rev-banner .rb-d{font-size:12px;color:var(--t-mid);margin-top:2px}
.rev-banner .btn{margin-left:auto;flex:0 0 auto}
tr.needsrev td:first-child{box-shadow:inset 3px 0 0 var(--orange)}
tr.fixed td:first-child{box-shadow:inset 3px 0 0 var(--cyan)}

/* ---------- Modal ---------- */
.modal{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.modal.on{display:flex}
.modal .mbg{position:absolute;inset:0;background:rgba(4,7,11,.7);backdrop-filter:blur(3px);animation:rise .25s ease}
.modal .mbox{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:var(--r-xl);
  box-shadow:var(--shadow);width:100%;max-width:660px;max-height:88vh;overflow-y:auto;animation:popIn .3s var(--ease)}
.modal .mh{display:flex;align-items:center;gap:11px;padding:18px 22px;border-bottom:1px solid var(--line);
  position:sticky;top:0;background:var(--panel);z-index:2}
.modal .mh h3{margin:0;font-family:var(--f-display);font-weight:700;font-size:19px;text-transform:uppercase}
.modal .mb{padding:20px 22px}
.modal .mf{display:flex;gap:10px;padding:16px 22px;border-top:1px solid var(--line);position:sticky;bottom:0;background:var(--panel)}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
@media(max-width:560px){.fgrid{grid-template-columns:1fr}}
.fld{display:flex;flex-direction:column;gap:5px}
.fld label{font-family:var(--f-mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--t-low);
  display:flex;align-items:center;gap:6px}
.fld label .miss{color:var(--orange);font-style:normal}
.fld select,.fld input{background:var(--bg);border:1px solid var(--line);border-radius:var(--r-sm);padding:9px 11px;
  color:var(--t-hi);font-family:var(--f-ui);font-size:13.5px;outline:0;width:100%;transition:border-color .2s}
.fld select:focus,.fld input:focus{border-color:var(--accent)}
.fld select.missing{border-color:color-mix(in srgb,var(--orange) 55%,var(--line));background:color-mix(in srgb,var(--orange) 7%,var(--bg))}
.msum{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);padding:13px 15px;
  font-size:12.5px;color:var(--t-mid);line-height:1.5;margin-bottom:16px}
.msum b{color:var(--t-hi)}
.mclip{width:100%;border-radius:var(--r-md);border:1px solid var(--line);background:#000;margin-bottom:16px;display:block}

.hudl-help{margin-top:14px;padding:16px 18px;border-radius:var(--r-md);background:var(--surface);
  border:1px solid var(--line);border-left:3px solid var(--cyan);animation:rise .4s var(--ease)}
.hudl-help .hh-t{font-weight:700;font-size:13.5px;margin-bottom:4px}
.hudl-help .hh-d{font-size:12.5px;color:var(--t-mid);line-height:1.5}
.hudl-help ol{margin:11px 0 0;padding-left:20px;font-size:12.5px;color:var(--t-mid);line-height:1.9}
.hudl-help ol b{color:var(--t-hi)}
.hudl-help .hh-n{margin-top:11px;font-size:11.5px;color:var(--t-low);line-height:1.5}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--panel);
  border:1px solid var(--line);border-radius:var(--r-pill);padding:11px 20px;font-size:13px;font-weight:600;
  box-shadow:var(--shadow);z-index:200;opacity:0;transition:all .35s var(--ease);pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{border-color:var(--red);color:var(--red)}
.toast.ok{border-color:var(--accent)}

@media(max-width:1240px){.tb-title span{display:none}.engine-chip{display:none}}
@media(max-width:1060px){.app{grid-template-columns:212px 1fr}}
@media(max-width:860px){
  .app{grid-template-columns:1fr}

  .side.open{transform:translateX(0)}
  .side-close{display:flex}
  .scrim{display:block;position:fixed;inset:0;z-index:55;background:rgba(4,7,11,.6);backdrop-filter:blur(2px);

  .scrim.on{opacity:1;pointer-events:auto}
  .menu-btn{display:flex}
  .tb-theme{display:none}
  .topbar{height:58px;padding:0 14px;gap:10px}
  .tb-title b{font-size:19px}
  .page{padding:18px 16px 80px}
  .pagetitle{font-size:25px}
  .tiles{grid-template-columns:repeat(2,1fr);gap:12px}
  .grid{gap:13px}
  .tile .tv{font-size:32px}
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tbl-wrap .tbl{min-width:680px}
  .intake{flex-wrap:wrap}
  .intake .field-in{flex:1 1 100%;order:-1}
  .seg button{padding:7px 12px;font-size:12px}
  .amb{display:none}
}
@media(max-width:560px){
  .tiles{grid-template-columns:1fr}
  .topbar{flex-wrap:wrap;height:auto;padding:10px 14px}
  .tb-title{order:1}.menu-btn{order:0}.icon-btn{order:2;margin-left:auto}
  .seg{order:3;flex:1 1 100%}
  .seg button{flex:1;justify-content:center}

  .pagetitle{font-size:23px}
  .card-h{flex-wrap:wrap}
  .card-h .right{margin-left:0;width:100%}
}
@media print{
  @page{margin:14mm}
  html,body{background:#fff!important}
  .side,.topbar,.no-print,.scrim,.menu-btn,.modal,.toast,.amb{display:none!important}
  body,.app,.main{display:block;height:auto;overflow:visible}

  .card,.tile,.alert,.barrow,.logrow,.mcell,.fieldwrap,.donut-wrap,.intake,tr,thead{break-inside:avoid;page-break-inside:avoid}
  .grid,.tiles,.matrix{break-inside:auto}
  .card{box-shadow:none;margin-bottom:12px;transform:none!important}
  h1,h2,h3,.pagetitle,.card-h{break-after:avoid;page-break-after:avoid}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}

<body>
<div class="amb"><i></i><i></i></div>
<div class="app">
  <aside class="side" id="side">
    <div class="brand" id="brand"></div>
    <div class="nav-group">Breakdown</div>
    <nav id="nav1"></nav>
    <div class="nav-group">Library</div>
    <nav id="nav2"></nav>

      <div class="side-theme tb-theme-m"></div>

    </div>

  <div class="main">

      <button class="menu-btn" onclick="drawer(true)" aria-label="Open menu"></button>
      <div class="tb-title"><b id="tbTitle">Film Room</b><span id="tbSub">Load film and chart every snap</span></div>
      <div class="seg" id="scopeSeg"></div>

</div>

<div class="modal" id="modal"><div class="mbg" onclick="closeModal()"></div><div class="mbox" id="mbox"></div></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================================
   GRIDIRON IQ — client. Vanilla, no framework.

   CORE PRINCIPLE — every number is derived from real charted plays, and every
   aggregate reports its denominator. A field the engine could not read is null;
   nulls are EXCLUDED from percentages, never bucketed into a default. If 41
   snaps were charted and 38 had a readable coverage, the donut says "38 of 41
   read". The coach decides how much to trust it. That's the product.
   ========================================================================= */
const P = {
  film:'M4 3h16a1 1 0 011 1v16a1 1 0 01-1 1H4a1 1 0 01-1-1V4a1 1 0 011-1zM3 8h18M3 16h18M8 3v18M16 3v18',
  swords:'M14.5 17.5L3 6V3h3l11.5 11.5M13 19l6-6M16 16l4 4M19 21l2-2M14.5 6.5L18 3h3v3l-3.5 3.5',
  shield:'M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z',
  bars:'M3 3v18h18M7 16v-5M12 16V8M17 16v-3',
  clipboard:'M9 2h6a1 1 0 011 1v2H8V3a1 1 0 011-1zM8 4H6a2 2 0 00-2 2v14a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-2',
  database:'M12 2c4.4 0 8 1.3 8 3s-3.6 3-8 3-8-1.3-8-3 3.6-3 8-3zM4 5v14c0 1.7 3.6 3 8 3s8-1.3 8-3V5M4 12c0 1.7 3.6 3 8 3s8-1.3 8-3',
  report:'M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8zM14 2v6h6M9 13h6M9 17h6',
  route:'M6 19a3 3 0 100-6 3 3 0 000 6zM18 8a3 3 0 100-6 3 3 0 000 6zM9 16h5a3 3 0 003-3V9',
  target:'M12 22a10 10 0 100-20 10 10 0 000 20zM12 18a6 6 0 100-12 6 6 0 000 12zM12 14a2 2 0 100-4 2 2 0 000 4z',
  siren:'M12 8a4 4 0 014 4v4H8v-4a4 4 0 014-4zM12 3v2M5 9H3M21 9h-2M6.3 4.3L5 3M17.7 4.3L19 3M4 20h16',
  zap:'M13 2L4 14h7l-1 8 9-12h-7l1-8z',
  trend:'M22 7l-8.5 8.5-5-5L2 17M16 7h6v6',
  bulb:'M9 18h6M10 22h4M12 2a6 6 0 00-4 10.5c.7.7 1 1.5 1 2.5h6c0-1 .3-1.8 1-2.5A6 6 0 0012 2z',
  layers:'M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5',
  flag:'M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1zM4 22v-7',
  move:'M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20',
  grid:'M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z',
  search:'M11 19a8 8 0 100-16 8 8 0 000 16zM21 21l-4.3-4.3',
  printer:'M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z',
  download:'M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3',
  upload:'M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12',
  sun:'M12 17a5 5 0 100-10 5 5 0 000 10zM12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4',
  moon:'M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z',
  x:'M18 6L6 18M6 6l12 12',
  check:'M20 6L9 17l-5-5',
  alert:'M12 9v4M12 17h.01M10.3 3.9L1.8 18a2 2 0 001.7 3h17a2 2 0 001.7-3L13.7 3.9a2 2 0 00-3.4 0z',
  edit:'M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.1 2.1 0 013 3L12 15l-4 1 1-4z',
};
const ic = (n,s) => `<svg class="ico" width="${s||18}" height="${s||18}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="${P[n]||''}"/></svg>`;

const TABS = [
  {id:'film',      name:'Film Room',         icon:'film',      group:1, title:'Film Room',         sub:'Load film and chart every snap'},
  {id:'offense',   name:'Offense Scout',     icon:'swords',    group:1, title:'Offense Scout',     sub:'What they line up in'},
  {id:'defense',   name:'Defense Scout',     icon:'shield',    group:1, title:'Defense Scout',     sub:'How they answer'},
  {id:'tendencies',name:'Tendencies',        icon:'bars',      group:1, title:'Tendencies',        sub:"What's coming"},
  {id:'situations',name:'Situations & Plan', icon:'clipboard', group:1, title:'Situations & Plan', sub:'The call sheet'},
  {id:'plays',     name:'Play Database',     icon:'database',  group:2, title:'Play Database',     sub:'Every charted snap'},
  {id:'report',    name:'Game Report',       icon:'report',    group:2, title:'Game Report',       sub:'Print-ready breakdown'},
];
let PLAYS=[], HEALTH=null, SCHEMA=null, JOB=null, POLL=null, AUTH=null;
let TEAM=null;

/* The school is the first path segment. Every data call is namespaced to it.
   There is no un-namespaced endpoint to accidentally hit — the server has none,
   and neither do we.

   Note: no other school is ever named anywhere in what we ship to the browser,
   not even in a comment. A coach can View Source, and finding a rival program's
   name in his own tool is not a thing you can explain away. */
const TID = (location.pathname.split('/')[1] || 'gridiron').toLowerCase();
const api = p => '/api/' + TID + p;
let active = localStorage.getItem('giq-tab') || 'film';
let scope='self', selForm=null, playFilter={q:'',type:'',qtr:''};

/* ============================================================================
   BRANDING — one codebase, any school.

   Every color in the stylesheet is already a CSS variable, so re-skinning for a
   new program means rewriting four of them. The trap is dark mode: most college
   brand colors are DEEP (navy, maroon, ACU's #4f2170 purple) and go nearly
   invisible as an accent on a near-black film-room UI. So each team carries an
   `accentDark` — a brightened version used only in dark mode — while `primary`
   stays exact for the mark, light mode, and anything that gets printed.
   ========================================================================= */
function applyTeam(t){
  if(!t) return;
  TEAM = t;
  const root = document.documentElement;
  const dark = root.getAttribute('data-theme') === 'dark';
  const accent = dark ? (t.accentDark || t.primary) : t.primary;
  root.style.setProperty('--accent', accent);
  root.style.setProperty('--accent-ink', dark ? pickInk(accent) : (t.onPrimary || '#fff'));
  root.style.setProperty('--brand', t.primary);
  root.style.setProperty('--cyan', t.secondary || '#34e0ec');
  root.style.setProperty('--glow', hexA(accent, .16));
  document.title = `${t.school} — Film Intelligence`;
  const link = document.querySelector('link[rel=icon]');
  if (t.logo) link.href = t.logo;   // their actual mark in the browser tab
}
/* Contrast check — white text on a pale accent is unreadable, and a coach
   noticing that before he notices the analytics is a bad first ten seconds. */
function pickInk(hex){
  const c = hex.replace('#',''); const n = parseInt(c.length===3 ? c.split('').map(x=>x+x).join('') : c, 16);
  const L = (0.2126*(n>>16&255) + 0.7152*(n>>8&255) + 0.0722*(n&255)) / 255;
  return L > 0.62 ? '#0a0d12' : '#ffffff';
}
const hexA = (hex,a) => { const c=hex.replace('#',''); const n=parseInt(c,16);
  return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`; };

/* Numbers count up rather than snapping — makes the dashboard feel live as the
   engine charts. Runs after each render on anything tagged data-count. */
function animateCounts(){
  if (reduced) return;
  document.querySelectorAll('[data-count]').forEach(n=>{
    const target = parseFloat(n.dataset.count);
    if (!isFinite(target)) return;
    const dec = (n.dataset.count.split('.')[1]||'').length;
    const dur = 700, t0 = performance.now();
    const step = now => {
      const k = Math.min(1,(now-t0)/dur), e = 1-Math.pow(1-k,3);
      n.textContent = (target*e).toFixed(dec);
      if (k<1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  });
}
/* Bars grow from zero on each render. */
function animateBars(){
  document.querySelectorAll('[data-w]').forEach(b=>{
    const w=b.dataset.w; b.style.width='0%';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{ b.style.width=w+'%'; }));
  });
}

/* ============================================================================
   ANALYTICS — null-aware. The honesty contract, in code.
   ========================================================================= */
const notNull=(p,f)=>p[f]!==null&&p[f]!==undefined;
const readable=(ps,f)=>ps.filter(p=>notNull(p,f));
function freq(ps,field){
  const read=readable(ps,field), m=new Map();
  read.forEach(p=>m.set(p[field],(m.get(p[field])||0)+1));
  const rows=[...m.entries()].map(([name,n])=>({name,n,pct:read.length?Math.round(n/read.length*100):0})).sort((a,b)=>b.n-a.n);
  return {rows,read:read.length,total:ps.length,missing:ps.length-read.length};
}
function rp(ps){
  const read=readable(ps,'playType');
  const run=read.filter(p=>p.playType==='Run').length, pass=read.length-run;
  return {run,pass,read:read.length,
    runPct:read.length?Math.round(run/read.length*100):0,
    passPct:read.length?Math.round(pass/read.length*100):0};
}
const isExplosive=p=>notNull(p,'gain')&&p.gain>=12;
const scoped=()=>PLAYS;

const DD_BUCKETS=[
  {key:'1st & 10',   test:p=>p.down===1},
  {key:'2nd & Short',test:p=>p.down===2&&p.dist<=3},
  {key:'2nd & Med',  test:p=>p.down===2&&p.dist>=4&&p.dist<=7},
  {key:'2nd & Long', test:p=>p.down===2&&p.dist>=8},
  {key:'3rd & Short',test:p=>p.down===3&&p.dist<=3},
  {key:'3rd & Med',  test:p=>p.down===3&&p.dist>=4&&p.dist<=7},
  {key:'3rd & Long', test:p=>p.down===3&&p.dist>=8},
  {key:'4th Down',   test:p=>p.down===4},
];
function ddMatrix(ps){
  const usable=ps.filter(p=>notNull(p,'down')&&notNull(p,'dist')&&notNull(p,'playType'));
  return {cells:DD_BUCKETS.map(b=>{const inb=usable.filter(b.test),s=rp(inb);
    return {dd:b.key,n:inb.length,run:s.runPct,pass:s.passPct};}),
    read:usable.length,total:ps.length};
}
function blitzTable(ps){
  const bl=ps.filter(p=>p.blitz===true), m=new Map();
  bl.forEach(p=>{
    const k=p.blitzType||p.blitzOrigin||'Unspecified';
    if(!m.has(k)) m.set(k,{origin:k,n:0,sack:0,hurry:0,yds:0});
    const r=m.get(k); r.n++;
    if(notNull(p,'gain')){ r.yds+=p.gain; if(p.gain<0) r.sack++; else if(p.gain<=2) r.hurry++; }
  });
  const rows=[...m.values()].sort((a,b)=>b.n-a.n);
  rows.forEach(r=>{ r.avg=r.n?+(r.yds/r.n).toFixed(1):0;
    r.verdict=r.avg<=2?'Effective':r.avg>=7?'Beatable':'Neutral'; });
  return {rows,blitzes:bl.length,read:readable(ps,'blitz').length,total:ps.length};
}
function coverageDamage(ps){
  const m=new Map();
  ps.filter(p=>notNull(p,'coverage')&&notNull(p,'gain')).forEach(p=>{
    if(!m.has(p.coverage)) m.set(p.coverage,{cov:p.coverage,n:0,yds:0,exp:0});
    const r=m.get(p.coverage); r.n++; r.yds+=p.gain; if(isExplosive(p)) r.exp++;
  });
  return [...m.values()].map(r=>({...r,avg:+(r.yds/r.n).toFixed(1)})).sort((a,b)=>b.avg-a.avg);
}
function conceptTable(ps){
  const m=new Map();
  ps.filter(p=>notNull(p,'concept')).forEach(p=>{
    if(!m.has(p.concept)) m.set(p.concept,{name:p.concept,n:0,yds:0,type:p.playType,exp:0});
    const r=m.get(p.concept); r.n++; if(notNull(p,'gain')) r.yds+=p.gain; if(isExplosive(p)) r.exp++;
  });
  return [...m.values()].map(r=>({...r,avg:r.n?+(r.yds/r.n).toFixed(1):0})).sort((a,b)=>b.n-a.n);
}

function confBadge(p){
  if(p.corrected) return `<span class="conf fixed" title="Confirmed by a coach">${ic('check',10)}FIXED</span>`;
  const c=typeof p.minConf==='number'?p.minConf:1;
  const k=c>=.8?'hi':c>=.55?'mid':'lo';
  return `<span class="conf ${k}" title="Engine confidence on its weakest read">${Math.round(c*100)}%</span>`;
}
/* The most important component in the app: how we render "we don't know." */
const val=v=>v===null||v===undefined?'<span class="unk">not read</span>':esc(v);
const denom=d=>`<span class="denom ${d.missing>0?'warn':''}">${d.read} of ${d.total} read${d.missing>0?` · ${d.missing} unread`:''}</span>`;
const ddText=p=>(notNull(p,'down')&&notNull(p,'dist'))?`${p.down}${['st','nd','rd','th'][p.down-1]||'th'} & ${p.dist}`:'—';
const gainCls=g=>g===null||g===undefined?'':g>=12?'big':g>0?'pos':'neg';
const gainTxt=g=>g===null||g===undefined?'—':(g>0?'+':'')+g;
const num=(v,dec)=>v===null||v===undefined||v==='—'?'—':`<span data-count="${Number(v).toFixed(dec||0)}">0</span>`;
const bar=(pct,col)=>`<div class="bar-track"><div class="bar-fill" data-w="${pct}" style="background:${col}"></div></div>`;

const emptyState=(t,m,i)=>`<div class="empty"><div class="ei">${ic(i||'film',26)}</div><b>${esc(t)}</b><p>${m}</p></div>`;

function fieldSVG(p){
  const W=560,H=280,LOS=170;
  let g=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  for(let y=30;y<H;y+=35) g+=`<line x1="0" y1="${y}" x2="${W}" y2="${y}" stroke="var(--field-line)" stroke-width="${y===LOS?1.6:.6}" opacity="${y===LOS?.9:.35}"/>`;
  const spots=[[90,'X'],[190,'LT'],[230,'LG'],[270,'C'],[310,'RG'],[350,'RT'],[420,'Y'],[480,'Z']];
  const routes=p.routes||{};
  let d=0;
  spots.forEach(([x,lab])=>{
    g+=`<circle cx="${x}" cy="${LOS}" r="7" fill="none" stroke="var(--field-line)" stroke-width="1.6"/>`;
    g+=`<text x="${x}" y="${LOS+3.5}" font-size="7" fill="var(--field-line)" text-anchor="middle" font-family="monospace">${lab}</text>`;
    const r=routes[lab];
    if(r&&r!=='Block'){
      const isRun=r==='Run Path', col=isRun?'var(--run)':'var(--pass)';
      const dy=70+(lab.charCodeAt(0)%3)*22;
      d+=90;
      g+=`<path class="rt" style="--len:${dy};animation-delay:${d}ms" d="M${x} ${LOS-9} L${x} ${LOS-dy}" stroke="${col}" stroke-width="2.4" fill="none" stroke-linecap="round"/>`;
      g+=`<text x="${x+7}" y="${LOS-dy-4}" font-size="8" fill="${col}" font-family="monospace">${esc(r)}</text>`;
    }
  });
  g+=`<circle cx="270" cy="${LOS+34}" r="7" fill="none" stroke="var(--lime)" stroke-width="1.8"/>`;
  g+=`<text x="270" y="${LOS+37.5}" font-size="7" fill="var(--lime)" text-anchor="middle" font-family="monospace">QB</text>`;
  if(p.blitz===true) g+=`<path class="rt" style="--len:80" d="M270 ${LOS-60} L270 ${LOS+20}" stroke="var(--pressure)" stroke-width="2.4" stroke-dasharray="5 4" fill="none"/>`;
  return `<div class="fieldwrap">${g}</svg></div>`;
}

function screenDefense(){
  const ps=scoped(); if(!ps.length) return NO_FILM();
  const CV=freq(ps,'coverage'), FR=freq(ps,'front'), BT=blitzTable(ps), dmg=coverageDamage(ps);
  const CO=['var(--blue)','var(--lime)','var(--orange)','var(--violet)','var(--cyan)','var(--gold)','var(--green)','var(--red)'];
  let a0=0, donut='';
  CV.rows.forEach((r,i)=>{
    const a1=a0+(r.pct/100)*360, L=(a1-a0)>180?1:0, R=52, cx=70, cy=70;
    const x0=cx+R*Math.cos((a0-90)*Math.PI/180), y0=cy+R*Math.sin((a0-90)*Math.PI/180);
    const x1=cx+R*Math.cos((a1-90)*Math.PI/180), y1=cy+R*Math.sin((a1-90)*Math.PI/180);
    donut+=`<path d="M${x0} ${y0} A${R} ${R} 0 ${L} 1 ${x1} ${y1}" fill="none" stroke="${CO[i%8]}" stroke-width="22"
      style="stroke-dasharray:340;stroke-dashoffset:340;animation:drawIn .9s var(--ease) ${i*110}ms forwards"><title>${esc(r.name)} — ${r.pct}%</title></path>`;
    a0=a1;
  });
  const br=BT.read?Math.round(BT.blitzes/BT.read*100):0;
  return `
    <div class="eyebrow">Defense Scout</div><h1 class="pagetitle">How they answer</h1>
    <p class="intro">Coverage, front and pressure tendencies. Every percentage is computed only over snaps where that specific read succeeded — never padded with a default.</p>
    <div style="height:18px"></div>
    <div class="grid g-2">
      <div class="card"><div class="card-h"><div class="h-ic">${ic('shield',16)}</div><div><h3>Coverage Distribution</h3></div>
        <div class="right">${denom(CV)}</div></div>
        <div class="card-b">${CV.rows.length?`
          <div class="row" style="align-items:center;gap:20px;flex-wrap:wrap">
            <div class="donut-wrap"><svg width="140" height="140" viewBox="0 0 140 140">${donut}</svg>
              <div class="donut-c"><b>${CV.read}</b><span>snaps</span></div></div>
            <div style="flex:1;min-width:170px">${CV.rows.map((r,i)=>`
              <div class="barrow" style="padding:5px 0"><div class="bl" style="width:auto;flex:1;font-size:12.5px">
                <span style="width:10px;height:10px;border-radius:3px;background:${CO[i%8]};display:inline-block"></span>${esc(r.name)}</div>
                <div class="bv">${r.n}<span class="pct"> ${r.pct}%</span></div></div>`).join('')}</div>
          </div>`:`<p class="unk" style="font-size:13px">Coverage wasn't readable on any snap.</p>`}</div></div>
      <div class="card"><div class="card-h"><div class="h-ic">${ic('layers',16)}</div>
        <div><h3>Front Distribution</h3><div class="sub">Blitz rate ${br}%</div></div>
        <div class="right">${denom(FR)}</div></div>
        <div class="card-b">${FR.rows.length?FR.rows.map(r=>`
          <div class="barrow"><div class="bl">${esc(r.name)}</div>${bar(r.pct,'var(--violet)')}
            <div class="bv">${r.n}<span class="pct"> ${r.pct}%</span></div></div>`).join('')
          :`<p class="unk" style="font-size:13px">Front wasn't readable on any snap.</p>`}</div></div>
    </div>
    <div style="height:16px"></div>
    <div class="grid g-12">
      <div class="card"><div class="card-h"><div class="h-ic">${ic('siren',16)}</div>
        <div><h3>Blitz Origin &amp; Pressure Results</h3><div class="sub">${BT.blitzes} blitz${BT.blitzes===1?'':'es'} of ${BT.read} snaps read</div></div></div>
        <div class="card-b">${BT.rows.length?`<div class="tbl-wrap"><table class="tbl"><thead><tr>
          <th>Origin</th><th class="num">Blitzes</th><th class="num">Sacks</th><th class="num">Hurries</th><th class="num">Yds/Play</th><th>Verdict</th></tr></thead><tbody>
          ${BT.rows.map(r=>`<tr><td class="mono">${esc(r.origin)}</td><td class="num">${r.n}</td><td class="num">${r.sack}</td>
            <td class="num">${r.hurry}</td><td class="num">${r.avg}</td>
            <td><span class="pill ${r.verdict==='Effective'?'hot':r.verdict==='Beatable'?'lime':'cool'}">${r.verdict}</span></td></tr>`).join('')}
          </tbody></table></div>`:`<p class="unk" style="font-size:13px">No blitzes charted.</p>`}</div></div>
      <div class="card"><div class="card-h"><div class="h-ic">${ic('target',16)}</div>
        <div><h3>Where They're Vulnerable</h3><div class="sub">Coverages giving up the most</div></div></div>
        <div class="card-b">${dmg.length?dmg.slice(0,4).map(d=>`
          <div class="alert ${d.avg>=7?'tip':'cool'}" style="margin-bottom:10px"><div class="a-ic">${ic(d.avg>=7?'zap':'shield',17)}</div>
            <div><div class="a-t">${esc(d.cov)} — ${d.avg} yds/play</div>
              <div class="a-d">${d.n} snap${d.n===1?'':'s'}${d.exp?`, <b>${d.exp} explosive</b>`:''}. ${d.avg>=7?'This is the soft spot — attack it.':'Holding up well.'}</div></div></div>`).join('')
          :`<p class="unk" style="font-size:13px">Not enough coverage + result data yet.</p>`}</div></div>
    </div>`;
}

function screenTendencies(){
  const ps=scoped(); if(!ps.length) return NO_FILM();
  const M=ddMatrix(ps), HS=freq(ps,'hash'), MO=freq(ps,'motion');
  const motioned=ps.filter(p=>notNull(p,'motion')&&p.motion!=='None');
  const mr=MO.read?Math.round(motioned.length/MO.read*100):0;
  const pa=ps.filter(p=>p.playType==='Play Action').length;
  const rpo=ps.filter(p=>p.playType==='RPO').length;
  const tR=readable(ps,'playType').length;
  const cc=c=>!c.n?'background:var(--chip);color:var(--t-low)'
    :`background:color-mix(in srgb, var(--run) ${Math.round(c.run/100*30)}%, color-mix(in srgb, var(--pass) ${Math.round((1-c.run/100)*30)}%, var(--surface)));`;
  return `
    <div class="eyebrow">Tendencies</div><h1 class="pagetitle">What's coming</h1>
    <p class="intro">Down &amp; distance is the read the engine most often can't make — raw sideline film usually has no scoreboard. Snaps where it couldn't be read are <b>excluded</b> from this matrix instead of being counted as 1st &amp; 10. Confirm them in review and they appear here.</p>
    <div style="height:18px"></div>
    <div class="card"><div class="card-h"><div class="h-ic">${ic('bars',16)}</div>
      <div><h3>Down &amp; Distance</h3><div class="sub">Green = run-leaning · Blue = pass-leaning</div></div>
      <div class="right">${denom({read:M.read,total:M.total,missing:M.total-M.read})}</div></div>
      <div class="card-b">${M.read?`<div class="matrix">${M.cells.map((c,i)=>`
        <div class="mcell" style="${cc(c)};animation-delay:${i*45}ms">
          <div class="mc-h">${c.dd}</div><div class="mc-v">${c.n?c.run+'%':'—'}</div>
          <div class="mc-s">${c.n?`run · ${c.n} snap${c.n===1?'':'s'}`:'no data'}</div></div>`).join('')}</div>`
        :`<div class="alert" style="border-left-color:var(--orange)"><div class="a-ic">${ic('alert',17)}</div>
          <div><div class="a-t">No down &amp; distance could be read</div>
          <div class="a-d">This film has no readable scoreboard, so the engine can't place snaps in a situation. Open <b>Review</b> and set down &amp; distance on the plays that matter — this matrix fills in as you go. It will not guess for you.</div></div></div>`}
      </div></div>
    <div style="height:16px"></div>
    <div class="tiles">
      <div class="tile"><div class="tl">${ic('move',12)}Motion Rate</div><div class="tv">${MO.read?num(mr)+'%':'—'}</div>
        <div class="tnote">${motioned.length} of ${MO.read} read</div></div>
      <div class="tile"><div class="tl">${ic('zap',12)}Play-Action</div><div class="tv">${tR?num(Math.round(pa/tR*100))+'%':'—'}</div>
        <div class="tnote">${pa} snap${pa===1?'':'s'}</div></div>
      <div class="tile"><div class="tl">${ic('route',12)}RPO</div><div class="tv">${tR?num(Math.round(rpo/tR*100))+'%':'—'}</div>
        <div class="tnote">${rpo} snap${rpo===1?'':'s'}</div></div>
      <div class="tile"><div class="tl">${ic('flag',12)}Hash Bias</div>
        <div class="tv" style="font-size:24px">${HS.rows.length?esc(HS.rows[0].name):'—'}</div>
        <div class="tnote">${HS.rows.length?HS.rows[0].pct+'% of snaps':'not read'}</div></div>
    </div>
    <div style="height:16px"></div>
    <div class="card"><div class="card-h"><div class="h-ic">${ic('siren',16)}</div>
      <div><h3>Auto-Alerts</h3><div class="sub">Only fires on statistically meaningful samples</div></div></div>
      <div class="card-b"><div class="grid g-2">${autoAlerts(ps,M).join('')}</div></div></div>`;
}

/* Alerts only fire with a real sample behind them. A tendency drawn from three
   snaps isn't a tendency, and telling a coach otherwise is how you lose him. */
const MIN_N=6;
function autoAlerts(ps,M){
  const out=[];
  M.cells.filter(c=>c.n>=MIN_N).forEach(c=>{
    if(c.run>=70) out.push(`<div class="alert hot"><div class="a-ic">${ic('alert',17)}</div><div>
      <div class="a-t">${c.dd} — run heavy</div><div class="a-d">They run <b>${c.run}%</b> here across ${c.n} snaps. Load the box.</div></div></div>`);
    else if(c.pass>=75) out.push(`<div class="alert cool"><div class="a-ic">${ic('route',17)}</div><div>
      <div class="a-t">${c.dd} — pass heavy</div><div class="a-d">They throw <b>${c.pass}%</b> here across ${c.n} snaps. Expect drop-back.</div></div></div>`);
  });
  const bt=blitzTable(ps), tb=bt.rows[0];
  if(tb&&tb.n>=MIN_N) out.push(`<div class="alert"><div class="a-ic">${ic('siren',17)}</div><div>
    <div class="a-t">Go-to pressure: ${esc(tb.origin)}</div>
    <div class="a-d">${tb.n} of ${bt.blitzes} blitzes, giving up <b>${tb.avg} yds/play</b>. ${tb.avg>=7?'You can beat it.':'It works — have an answer ready.'}</div></div></div>`);
  const dmg=coverageDamage(ps).filter(d=>d.n>=MIN_N);
  if(dmg[0]&&dmg[0].avg>=7) out.push(`<div class="alert tip"><div class="a-ic">${ic('bulb',17)}</div><div>
    <div class="a-t">Attack ${esc(dmg[0].cov)}</div><div class="a-d">Giving up <b>${dmg[0].avg} yds/play</b> over ${dmg[0].n} snaps${dmg[0].exp?`, ${dmg[0].exp} explosive`:''}.</div></div></div>`);
  if(!out.length) out.push(`<div class="alert cool"><div class="a-ic">${ic('bulb',17)}</div><div>
    <div class="a-t">Not enough snaps yet</div>
    <div class="a-d">Alerts fire once a situation has at least <b>${MIN_N} snaps</b> behind it. A tendency built on three plays isn't a tendency — better to say nothing than send you into a game with a bad read.</div></div></div>`);
  return out;
}

function screenSituations(){
  const ps=scoped(); if(!ps.length) return NO_FILM();
  const rz=ps.filter(p=>notNull(p,'yard')&&p.yard<=20), rzs=rp(rz);
  const gl=rz.filter(p=>p.yard<=5), gls=rp(gl);
  const th=ps.filter(p=>p.down===3), ths=rp(th);
  const dmg=coverageDamage(ps).filter(d=>d.n>=3), bt=blitzTable(ps);
  const rows=[];
  const mk=(label,set,s)=>({sit:`${label} — ${set.length} snaps`,
    lean:s.runPct>=55?'Run':s.passPct>=55?'Pass':'Balanced', pct:Math.max(s.runPct,s.passPct),
    call:topConceptIn(set), note:`${s.run} run / ${s.pass} pass of ${s.read} read.`});
  if(rz.length>=3) rows.push(mk('Red zone (inside 20)',rz,rzs));
  if(gl.length>=3) rows.push(mk('Goal line (inside 5)',gl,gls));
  if(th.length>=3) rows.push(mk('3rd down',th,ths));
  const attack=dmg.slice(0,3).map(d=>`<div class="alert tip" style="margin-bottom:10px"><div class="a-ic">${ic('bulb',17)}</div>
    <div><div class="a-t">Attack ${esc(d.cov)}</div><div class="a-d">Gives up <b>${d.avg} yds/play</b> over ${d.n} snaps${d.exp?`, ${d.exp} explosive`:''}.</div></div></div>`).join('')
    ||`<p class="unk" style="font-size:13px">Need more coverage + result data.</p>`;
  const stop=bt.rows.slice(0,3).map(r=>`<div class="alert cool" style="margin-bottom:10px"><div class="a-ic">${ic('shield',17)}</div>
    <div><div class="a-t">${esc(r.origin)}</div><div class="a-d">${r.n} blitzes, ${r.sack} sack${r.sack===1?'':'s'}, <b>${r.avg} yds/play</b> allowed — ${r.verdict.toLowerCase()}.</div></div></div>`).join('')
    ||`<p class="unk" style="font-size:13px">No blitz data charted.</p>`;
  return `
    <div class="eyebrow">Situations &amp; Plan</div><h1 class="pagetitle">The call sheet</h1>
    <p class="intro">Situational splits need a readable yard line and down. Situations with fewer than 3 charted snaps are withheld — a call sheet built on noise is worse than no call sheet.</p>
    <div style="height:18px"></div>
    <div class="grid g-2">
      <div class="card"><div class="card-h"><div class="h-ic">${ic('clipboard',16)}</div><div><h3>Situational Tendencies</h3></div></div>
        <div class="card-b">${rows.length?rows.map(r=>`
          <div style="border-bottom:1px solid var(--line-soft);padding:11px 0">
            <div class="between"><b style="font-size:13.5px">${esc(r.sit)}</b>
              <span class="pill ${r.lean==='Run'?'run':r.lean==='Pass'?'pass':'cool'}">${esc(r.lean)} ${r.pct}%</span></div>
            <div style="font-size:12.5px;color:var(--accent);font-weight:700;margin-top:4px">${esc(r.call)}</div>
            <div style="font-size:12px;color:var(--t-mid);margin-top:2px">${r.note}</div></div>`).join('')
          :`<p class="unk" style="font-size:13px">Not enough snaps in any situation yet.</p>`}</div></div>
      <div class="card"><div class="card-h"><div class="h-ic">${ic('swords',16)}</div><div><h3>How to Attack Them</h3></div></div>
        <div class="card-b">${attack}</div></div>
    </div>
    <div style="height:16px"></div>
    <div class="card"><div class="card-h"><div class="h-ic">${ic('shield',16)}</div><div><h3>How to Stop Them</h3></div></div>
      <div class="card-b">${stop}</div></div>`;
}
function topConceptIn(ps){ const c=conceptTable(ps); return c.length?`${c[0].name} (${c[0].n}× · ${c[0].avg} yds)`:'no concept read'; }

/* ============================================================================
   REVIEW / CORRECTION — the trust loop
   ========================================================================= */
const revQueue=()=>PLAYS.filter(p=>p.needsReview).sort((a,b)=>a.minConf-b.minConf);
function openReview(){
  const q=revQueue();
  if(!q.length) return toast('Nothing to review — every snap read cleanly.','ok');
  openPlay(q[0].id,true);
}
function openPlay(id,queueMode){
  const p=PLAYS.find(x=>x.id===id); if(!p||!SCHEMA) return;
  const q=revQueue(), pos=q.findIndex(x=>x.id===id);
  /* Offer only concepts that are legal for this play type. The server enforces
     "no Power on a pass play" on ingest — the correction UI must not be the
     back door that lets a coach create the exact mismatch the engine refuses to. */
  const conceptsFor = pt =>
      pt==='Run'    ? SCHEMA.runConcepts
    : pt==='Screen' ? ['Screen Game']
    : (pt==='Pass'||pt==='Play Action'||pt==='RPO') ? SCHEMA.passConcepts
    : [...SCHEMA.runConcepts,...SCHEMA.passConcepts,...SCHEMA.stConcepts];
  const concepts = conceptsFor(p.playType);
  const sel=(name,label,opts,cur,extra)=>{
    const miss=p.unknown&&p.unknown.includes(name);
    return `<div class="fld"><label>${label}${miss?' <span class="miss">• not read</span>':''}</label>
      <select id="f_${name}" class="${miss?'missing':''}" ${extra||''}><option value="">${miss?'— set a value —':'—'}</option>
      ${opts.map(o=>`<option ${String(cur)===String(o)?'selected':''}>${esc(o)}</option>`).join('')}</select></div>`;
  };
  // Changing play type re-filters the concept list live, so the two can never
  // end up contradicting each other.
  window.syncConcepts = () => {
    const pt=$('#f_playType').value, c=$('#f_concept'), cur=c.value;
    const list=conceptsFor(pt);
    c.innerHTML=`<option value="">—</option>`+list.map(o=>`<option ${o===cur?'selected':''}>${esc(o)}</option>`).join('');
    if(cur && !list.includes(cur)) c.value='';   // stale concept dropped
  };
  const nf=(name,label,cur,ph)=>{
    const miss=p.unknown&&p.unknown.includes(name);
    return `<div class="fld"><label>${label}${miss?' <span class="miss">• not read</span>':''}</label>
      <input id="f_${name}" type="number" class="${miss?'missing':''}" value="${cur??''}" placeholder="${ph||''}"></div>`;
  };
  $('#mbox').innerHTML=`
    <div class="mh"><div style="width:30px;height:30px;border-radius:8px;background:var(--chip);display:flex;align-items:center;justify-content:center;color:var(--accent)">${ic('edit',16)}</div>
      <div><h3>Play ${p.id}</h3><div style="font-size:11.5px;color:var(--t-low)">${queueMode&&pos>-1?`Review ${pos+1} of ${q.length}`:'Confirm or correct the engine'}</div></div>
      <div style="margin-left:auto" class="row">${confBadge(p)}<button class="icon-btn" onclick="closeModal()">${ic('x',16)}</button></div></div>
    <div class="mb">
      ${p.videoT!=null?`<video class="mclip" controls preload="none" src="${api('/clip/'+p.id)}"></video>`:''}
      ${p.summary?`<div class="msum"><b>Engine read:</b> ${esc(p.summary)}</div>`:''}
      ${p.unknown&&p.unknown.length?`<div class="msum" style="border-left:3px solid var(--orange)">
        <b>Couldn't read:</b> ${p.unknown.map(esc).join(', ')}. Left blank rather than guessed — set them and this play joins the tendencies.</div>`:''}
      <div class="fgrid">
        ${sel('formation','Formation',SCHEMA.formations,p.formation)}
        ${sel('playType','Play type',SCHEMA.playTypes,p.playType,'onchange="syncConcepts()"')}
        ${sel('concept','Concept',concepts,p.concept)}
        ${sel('coverage','Coverage',SCHEMA.coverages,p.coverage)}
        ${sel('front','Front',SCHEMA.fronts,p.front)}
        ${sel('blitzType','Blitz',SCHEMA.blitzTypes,p.blitzType)}
        ${nf('down','Down',p.down,'1-4')}${nf('dist','Distance',p.dist,'yards')}
        ${nf('q','Quarter',p.q,'1-4')}${nf('yard','Yard line',p.yard,'1-99')}
        ${sel('hash','Hash',['L','M','R'],p.hash)}${nf('gain','Gain',p.gain,'yards')}
      </div></div>
    <div class="mf">
      <button class="btn primary" onclick="savePlay(${p.id},${!!queueMode})">${ic('check',15)}Save${queueMode&&q.length>1?' & next':''}</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
      ${queueMode&&q.length>1?`<button class="btn" style="margin-left:auto" onclick="skipReview(${p.id})">Skip</button>`:''}
    </div>`;
  $('#modal').classList.add('on');
}
function closeModal(){ $('#modal').classList.remove('on'); }
function skipReview(id){
  const q=revQueue().filter(p=>p.id!==id);
  q.length?openPlay(q[0].id,true):(closeModal(),toast('Review queue finished.','ok'));
}
async function savePlay(id,queueMode){
  const g=n=>{const e=$('#f_'+n); if(!e) return undefined; const v=e.value.trim(); return v===''?undefined:v;};
  const body={};
  ['formation','playType','concept','coverage','front','blitzType','hash'].forEach(k=>{const v=g(k); if(v!==undefined) body[k]=v;});
  ['down','dist','q','yard','gain'].forEach(k=>{const v=g(k); if(v!==undefined) body[k]=Number(v);});
  if(body.blitzType) body.blitz = body.blitzType!=='None';
  if(!Object.keys(body).length) return toast('Nothing to save.','err');
  try{
    const r=await fetch(api('/plays/'+id),{method:'PATCH',headers:{'content-type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json();
    if(!r.ok) throw new Error(d.error||'save failed');
    PLAYS[PLAYS.findIndex(p=>p.id===id)]=d.play;
    toast('Play '+id+' confirmed — tendencies updated.','ok');
    if(queueMode){ const q=revQueue(); q.length?openPlay(q[0].id,true):(closeModal(),toast('All plays confirmed.','ok')); }
    else closeModal();
    render();
  }catch(e){ toast(e.message,'err'); }
}

/* ============================================================================
   INTAKE
   ========================================================================= */
async function chartUrl(){
  const url=$('#filmUrl').value.trim();
  if(!url) return toast('Paste a film link first.','err');
  $('#intakeMsg').innerHTML='';
  try{
    const r=await fetch(api('/jobs/url'),{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({url})});
    const d=await r.json();
    if(r.status===422&&d.steps){ renderHudlHelp(d); return; }  // Hudl watch link — guide, don't fail
    if(!r.ok) throw new Error(d.error||'could not start');
    startJob(d.id);
  }catch(e){ toast(e.message,'err'); }
}
async function chartFile(input){
  const f=input.files[0]; if(!f) return;
  $('#intakeMsg').innerHTML='';
  const fd=new FormData(); fd.append('film',f);
  toast('Uploading '+Math.round(f.size/1048576)+' MB…');
  try{
    const r=await fetch(api('/jobs/upload'),{method:'POST',body:fd});
    const d=await r.json();
    if(!r.ok) throw new Error(d.error||'upload failed');
    startJob(d.id);
  }catch(e){ toast(e.message,'err'); }
  input.value='';
}
/* A Hudl watch link is a dead end — so make it a signpost, not an error. */
function renderHudlHelp(d){
  $('#intakeMsg').innerHTML=`<div class="hudl-help">
    <div class="hh-t">${esc(d.error)}</div><div class="hh-d">${esc(d.fix)}</div>
    <ol>${d.steps.map(s=>`<li>${esc(s)}</li>`).join('')}</ol>
    <div class="hh-n">${esc(d.note)}</div></div>`;
}
function startJob(id){
  JOB=id; toast('Charting started.','ok');
  clearInterval(POLL); POLL=setInterval(pollJob,2000); pollJob(); render();
}
async function pollJob(){
  if(!JOB) return;
  try{
    const j=await (await fetch(api('/jobs/'+JOB))).json();
    const pct=j.dur?Math.min(100,Math.round(j.t/j.dur*100)):0;
    const box=$('#jobStatus');
    if(box) box.innerHTML=`
      <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--line-soft)">
        <div class="between" style="margin-bottom:7px">
          <b style="font-size:12.5px;text-transform:capitalize;display:flex;align-items:center;gap:8px">
            ${j.status==='done'||j.status==='error'?'':'<span class="spinner"></span>'}
            ${esc(j.status)}${j.queuePos?` — ${j.queuePos} ahead`:''}</b>
          <span class="denom">${j.found} plays · ${pct}%${j.spentEst?` · ~$${j.spentEst}`:''}</span></div>
        <div class="gc-prog"><i style="width:${pct}%"></i></div>
        ${j.error?`<div style="color:var(--red);margin-top:9px;font-size:12px">${esc(j.error)}</div>`:''}
        ${j.log&&j.log.length?`<div class="mono" style="font-size:10.5px;color:var(--t-low);margin-top:9px;max-height:80px;overflow-y:auto">${j.log.slice(-4).map(esc).join('<br>')}</div>`:''}
      </div>`;
    const grew = j.found !== PLAYS.length;
    if(j.status==='done'||j.status==='error'){
      clearInterval(POLL); JOB=null;
      await loadPlays();
      j.status==='done'
        ? toast(`Charted ${j.found} plays${j.review?` — ${j.review} need review`:''}.`,'ok')
        : toast(j.error||'Charting failed.','err');
      render();
    } else if(grew){ await loadPlays(); render(); }   // live: screens fill in as snaps land
  }catch(e){}
}

function exportCSV(){
  const cols=['id','q','down','dist','yard','hash','formation','personnel','playType','concept','coverage','front','blitz','blitzType','gain','minConf','corrected','needsReview'];
  const csv=[cols.join(','),...PLAYS.map(p=>cols.map(c=>{
    const v=p[c]; return v===null||v===undefined?'':/[",]/.test(String(v))?`"${String(v).replace(/"/g,'""')}"`:v;
  }).join(','))].join('\n');
  dl(new Blob([csv],{type:'text/csv'}),'gridiron-iq-plays.csv');
}
function exportJSON(){ dl(new Blob([JSON.stringify(PLAYS,null,2)],{type:'application/json'}),'gridiron-iq-plays.json'); }
function dl(blob,name){
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),2000);
}

/* ============================================================================
   RENDER
   ========================================================================= */
function render(){
  const tab=TABS.find(t=>t.id===active)||TABS[0];
  localStorage.setItem('giq-tab',active);
  $('#tbTitle').textContent=tab.title;
  $('#tbSub').textContent=tab.sub;
  const rev=PLAYS.filter(p=>p.needsReview).length;

  // Brand lockup: their mark, their monogram, "IQ" chip stays ours.
  if(TEAM) $('#brand').innerHTML = `
    <span class="tile" style="display:block;width:38px;height:38px;flex:0 0 auto">${teamMark(TEAM,38)}</span>
    <div class="bt"><b>${esc(TEAM.school)}</b><span>${esc(TEAM.mascot)} · Film IQ</span></div>
    <button class="side-close" onclick="drawer(false)">${ic('x',18)}</button>`;

  const nav=g=>TABS.filter(t=>t.group===g).map(t=>`
    <div class="nav-item ${t.id===active?'active':''}" onclick="active='${t.id}';drawer(false);render()">
      ${ic(t.icon,17)}<span>${t.name}</span>
      ${t.id==='plays'&&PLAYS.length?`<span class="badge">${PLAYS.length}</span>`:''}
      ${t.id==='film'&&rev?`<span class="badge warn">${rev}</span>`:''}</div>`).join('');
  $('#nav1').innerHTML=nav(1);
  $('#nav2').innerHTML=nav(2);
  /* The Self-Scout / Opponent toggle used to live here. It was a lie: scoped()
     returned every play regardless, because a charted snap carries no team
     dimension — the engine reads one film, and the Offense/Defense screens
     already split it both ways. A control that does nothing is worse than no
     control; a coach clicks it, sees nothing move, and stops trusting the rest
     of the screen. Removed rather than faked. If you later chart your own film
     alongside an opponent's, tag plays with a team on ingest and bring it back
     as a real filter. */
  const rq = PLAYS.filter(p=>p.needsReview).length;
  $('#scopeSeg').innerHTML = rq
    ? `<button class="on" onclick="openReview()" style="color:var(--orange)">
         <span class="dot" style="background:var(--orange)"></span>${rq} to review</button>`
    : PLAYS.length
      ? `<button class="on"><span class="dot"></span>All ${PLAYS.length} confirmed</button>`
      : '';
  $('#engineChip').className='engine-chip'+(JOB?' busy':'');
  $('#engineChip').innerHTML=`<span class="pulse ${JOB?'':'idle'}"></span>${JOB?'Charting':'Engine ready'} <b>${PLAYS.length}</b> plays${rev?` · <b style="color:var(--orange)">${rev}</b> to review`:''}`;
  const pct=PLAYS.length?Math.round((PLAYS.length-rev)/PLAYS.length*100):0;
  $('#gamecard').innerHTML=`
    <div class="gc-top"><span class="gc-lbl">Confirmed</span><span class="gc-lbl" style="color:var(--accent)">${pct}%</span></div>
    <div class="gc-match">${PLAYS.length?PLAYS.length+' snaps':'No film'}</div>
    <div class="gc-meta">${rev?rev+' awaiting review':PLAYS.length?'All confirmed':'Load film to begin'}</div>
    <div class="gc-prog"><i style="width:${pct}%"></i></div>`;

  /* There is no school switcher, by design. This is one program's tool. A coach
     must never see that another school — least of all a conference rival — is
     also a customer. The server no longer enumerates tenants either. */

  const screens={film:screenFilm,offense:screenOffense,defense:screenDefense,
    tendencies:screenTendencies,situations:screenSituations,plays:screenPlays,report:screenReport};
  const page=$('#page');
  page.className='page'+(active==='report'?' narrow':'');
  page.innerHTML=(screens[active]||screenFilm)();
  renderTheme(); animateCounts(); animateBars();
}
async function loadPlays(){
  try{ const p=await (await fetch(api('/plays'))).json(); PLAYS=Array.isArray(p)?p:[]; }catch(e){}
}
/* ---------- lock screen ---------- */
function lockScreen(team){
  document.querySelector('.app').style.display='none';
  const t=team||{school:'Gridiron IQ',short:'GQ',primary:'#a6e016',onPrimary:'#0a0d12'};
  const box=document.createElement('div');
  box.id='lock';
  box.style.cssText='position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;padding:24px';
  box.innerHTML=`
    <div class="card pad" style="width:100%;max-width:380px;text-align:center;padding:32px 28px">
      <span style="display:block;width:56px;height:56px;margin:0 auto 18px">${teamMark(t,56)}</span>
      <div style="font-family:var(--f-display);font-weight:800;font-size:23px;text-transform:uppercase">${esc(t.school)}</div>
      <div class="lo" style="font-size:12.5px;margin:4px 0 22px">Film Intelligence — staff access</div>
      <input id="pw" type="password" placeholder="Team password" autofocus
        style="width:100%;background:var(--bg);border:1px solid var(--line);border-radius:var(--r-md);
               padding:12px 14px;color:var(--t-hi);font-family:var(--f-ui);font-size:14px;outline:0;text-align:center"
        onkeydown="if(event.key==='Enter')doLogin()">
      <button class="btn primary" style="width:100%;margin-top:12px;justify-content:center" onclick="doLogin()">Sign in</button>
      <div id="lockErr" style="color:var(--red);font-size:12.5px;margin-top:11px;min-height:16px"></div>
    </div>`;
  document.body.appendChild(box);
}
async function doLogin(){
  const pw=document.getElementById('pw').value;
  const r=await fetch(api('/login'),{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({password:pw})});
  if(!r.ok){ document.getElementById('lockErr').textContent='Wrong password.'; return; }
  document.getElementById('lock').remove();
  document.querySelector('.app').style.display='';
  boot();
}

async function boot(){
  document.documentElement.setAttribute('data-theme', localStorage.getItem('giq-theme')||'dark');
  const b=await fetch(api('/branding')).then(r=>r.json()).catch(()=>null);
  if(b) applyTeam(b.team);

  const auth=await fetch(api('/auth')).then(r=>r.json()).catch(()=>({authRequired:false,authed:true}));
  if(auth.authRequired && !auth.authed){ lockScreen(b&&b.team); return; }

  const [p,h,s]=await Promise.all([
    fetch(api('/plays')).then(r=>r.json()).catch(()=>[]),
    fetch(api('/health')).then(r=>r.json()).catch(()=>null),
    fetch(api('/schema')).then(r=>r.json()).catch(()=>null),
  ]);
  PLAYS=Array.isArray(p)?p:[]; HEALTH=h; SCHEMA=s;
  AUTH=auth;
  render();
  if(h&&!h.keySet) toast('Server has no ANTHROPIC_API_KEY set — charting is disabled.','err');
  /* An unprotected deployment must never be quietly unprotected. If Chris hands
     a coach a link before setting TEAM_PASSWORD, he finds out from us, not from
     a rival program reading his game plan. */
  if(!auth.authRequired){
    const w=document.createElement('div');
    w.className='no-print';
    w.style.cssText='background:var(--red);color:#fff;font-size:12.5px;font-weight:700;padding:8px 16px;text-align:center';
    w.textContent='This deployment has no password. Anyone with the link can read this film. Set TEAM_PASSWORD before sharing it.';
    document.querySelector('.main').prepend(w);
  }
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeModal(); drawer(false); } });
boot();
</script>
